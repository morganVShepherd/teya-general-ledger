spring.application.name=teya-general-ledger
server.port=8080
server.servlet.context-path=/api

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA and schema management
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Liquibase changelog location
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.root=INFO
logging.level.moo.interview.teya=DEBUG

# Message processor delay in milliseconds
teya.message-processor.delay-ms=10
teya.message-processor.max-retries=10
